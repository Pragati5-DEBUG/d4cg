<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="680" height="400">
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#78909c"/>
    </marker>
  </defs>
  <rect width="680" height="400" fill="#fafafa"/>
  <!-- Row 1 -->
  <g filter="url(#sh)">
    <rect x="36" y="44" width="118" height="50" rx="10" fill="#c8e6c9" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="95" y="76" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" fill="#2e7d32">config.yaml</text>
  </g>
  <g filter="url(#sh)">
    <rect x="210" y="36" width="148" height="66" rx="12" fill="#90caf9" stroke="#42a5f5" stroke-width="1.5"/>
    <text x="284" y="68" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#0d47a1">Express</text>
    <text x="284" y="88" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#1565c0">fetch + aggregate</text>
  </g>
  <g filter="url(#sh)">
    <rect x="414" y="44" width="132" height="50" rx="10" fill="#e1bee7" stroke="#ab47bc" stroke-width="1.5"/>
    <text x="480" y="76" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" fill="#6a1b9a">GraphQL API</text>
  </g>
  <!-- Arrows row 1 -->
  <line x1="156" y1="69" x2="206" y2="69" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="360" y1="69" x2="410" y2="69" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <!-- JSON -->
  <g filter="url(#sh)">
    <rect x="204" y="156" width="160" height="54" rx="12" fill="#fff9c4" stroke="#fbc02d" stroke-width="1.5"/>
    <text x="284" y="184" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#e65100">Heatmap JSON</text>
    <text x="284" y="202" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" fill="#f57c00">GET /api/heatmap/data</text>
  </g>
  <!-- Arrow to JSON from Express (internal) -->
  <line x1="284" y1="104" x2="284" y2="154" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Row 3 clients -->
  <g filter="url(#sh)">
    <rect x="80" y="292" width="108" height="46" rx="10" fill="#ffccbc" stroke="#ff7043" stroke-width="1.5"/>
    <text x="134" y="321" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#bf360c">Table</text>
  </g>
  <g filter="url(#sh)">
    <rect x="251" y="292" width="132" height="46" rx="10" fill="#b2dfdb" stroke="#26a69a" stroke-width="1.5"/>
    <text x="317" y="321" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#00695c">Clustergrammer</text>
  </g>
  <g filter="url(#sh)">
    <rect x="446" y="292" width="108" height="46" rx="10" fill="#d1c4e9" stroke="#7e57c2" stroke-width="1.5"/>
    <text x="500" y="321" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#4527a0">Vega-Lite</text>
  </g>
  <!-- Arrows JSON to clients -->
  <path d="M284 210 L284 248 L134 248 L134 288" fill="none" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M284 210 L284 248 L317 248 L317 288" fill="none" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M284 210 L284 248 L500 248 L500 288" fill="none" stroke="#78909c" stroke-width="2" marker-end="url(#arr)"/>
</svg>
