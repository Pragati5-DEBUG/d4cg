<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="520" rx="18" fill="#f8fafc"/>
  <text x="450" y="38" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="700" fill="#111827">
    d4cg Prototype Architecture (Config-driven Heatmap)
  </text>
  <text x="450" y="60" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#6b7280">
    config.yaml -> server.js -> GraphQL -> heatmap JSON -> views
  </text>

  <!-- Row 1 -->
  <g filter="url(#shadow)">
    <rect x="70" y="95" width="240" height="78" rx="16" fill="#c7f9cc" stroke="#34a853" stroke-width="2"/>
    <text x="190" y="128" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#14532d">
      config.yaml
    </text>
    <text x="190" y="150" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#14532d">
      endpoint, query_type, row/col fields, labels, scaling
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="85" width="220" height="98" rx="16" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
    <text x="450" y="125" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="800" fill="#1d4ed8">
      server.js (Express)
    </text>
    <text x="450" y="148" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#1d4ed8">
      fetch GraphQL + aggregate matrix
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="95" width="260" height="78" rx="16" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2"/>
    <text x="720" y="128" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="800" fill="#6d28d9">
      GraphQL endpoint
    </text>
    <text x="720" y="150" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#6d28d9">
      returns records for query_type
    </text>
  </g>

  <!-- Flow arrows removed -->

  <!-- Divider line between input blocks and JSON -->
  <line x1="90" y1="205" x2="810" y2="205" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- JSON box -->
  <g filter="url(#shadow)">
    <rect x="300" y="215" width="300" height="92" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="450" y="250" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="900" fill="#92400e">
      Heatmap JSON
    </text>
    <text x="450" y="275" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#92400e">
      /api/heatmap/data
    </text>
    <text x="450" y="295" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#92400e">
      rowLabels, colLabels, cells
    </text>
  </g>

  <!-- Row 2: Views -->
  <text x="450" y="335" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#6b7280">
    Same JSON drives all views
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="360" width="250" height="110" rx="18" fill="#ffedd5" stroke="#fb923c" stroke-width="2"/>
    <text x="195" y="398" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="900" fill="#9a3412">
      Table Heatmap
    </text>
    <text x="195" y="420" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#9a3412">
      public/index.html
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="350" y="360" width="250" height="110" rx="18" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    <text x="475" y="398" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="900" fill="#065f46">
      Clustergrammer (D3)
    </text>
    <text x="475" y="420" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#065f46">
      public/clustergrammer.html
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="630" y="360" width="220" height="110" rx="18" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <text x="740" y="398" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="900" fill="#3730a3">
      Vega-Lite
    </text>
    <text x="740" y="420" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#3730a3">
      public/vega.html
    </text>
  </g>

  <!-- JSON to clients arrows removed -->
</svg>

