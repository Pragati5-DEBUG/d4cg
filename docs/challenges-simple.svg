<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="900" height="520" rx="18" fill="#f8fafc"/>
  <text x="450" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#0f172a">
    Prototype challenges
  </text>
  <text x="450" y="64" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#475569">
    What can block usability, correctness, and reliability
  </text>

  <!-- Row 1 -->
  <g filter="url(#sh)">
    <rect x="60" y="105" width="250" height="78" rx="16" fill="#c7f9cc" stroke="#22c55e" stroke-width="2"/>
    <text x="185" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#14532d">
      Large matrices
    </text>
    <text x="185" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#166534">
      render cost + memory
    </text>
  </g>

  <g filter="url(#sh)">
    <rect x="340" y="105" width="240" height="78" rx="16" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <text x="460" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#312e81">
      Label readability
    </text>
    <text x="460" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#4338ca">
      axis overlap, ticks
    </text>
  </g>

  <g filter="url(#sh)">
    <rect x="600" y="105" width="240" height="78" rx="16" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
    <text x="720" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#92400e">
      Value scaling
    </text>
    <text x="720" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#b45309">
      counts vs z-score
    </text>
  </g>

  <!-- Row 2 -->
  <g filter="url(#sh)">
    <rect x="140" y="205" width="250" height="78" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="265" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#92400e">
      Sparse vs zero
    </text>
    <text x="265" y="262" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#b45309">
      missing vs true 0
    </text>
  </g>

  <g filter="url(#sh)">
    <rect x="420" y="205" width="250" height="78" rx="16" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
    <text x="545" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#991b1b">
      Interaction consistency
    </text>
    <text x="545" y="262" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#b91c1c">
      table vs matrix UX
    </text>
  </g>

  <!-- Row 2 right -->
  <g filter="url(#sh)">
    <rect x="680" y="205" width="170" height="78" rx="16" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
    <text x="765" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#075985">
      Sync
    </text>
    <text x="765" y="262" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0369a1">
      cross-view selection
    </text>
  </g>

  <!-- Row 3 -->
  <g filter="url(#sh)">
    <rect x="220" y="310" width="460" height="110" rx="20" fill="#ddd6fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="450" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="900" fill="#5b21b6">
      GraphQL / config failures
    </text>
    <text x="450" y="372" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#6d28d9">
      wrong fields, endpoint errors, query limits
    </text>
    <text x="450" y="394" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#7c3aed">
      needs validation + clear error messaging
    </text>
  </g>
</svg>

